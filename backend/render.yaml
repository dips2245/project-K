services:
  - type: web
    name: bliss-nepal-api
    runtime: node
    repo: https://github.com/your-username/your-repo
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bliss-nepal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: WHATSAPP_NUMBER
        value: 9779800000000
      - key: INITIAL_ADMIN_EMAIL
        value: admin@blissnepal.com
      - key: INITIAL_ADMIN_PASSWORD
        value: admin123

databases:
  - name: bliss-nepal-db
    plan: free
    region: singapore
